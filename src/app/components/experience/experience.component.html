<section class="section experience" id="experience">
  <div class="container">
    <div class="section__header">
      <span class="section__eyebrow">Experience</span>
      <h2 class="section__title">Work History</h2>
      <p class="section__subtitle">
        Professional journey across telecom and enterprise software development.
      </p>
    </div>

    <div class="timeline">
      @for (job of experience; track job.company; let i = $index) {
        <article class="timeline__item" [class.timeline__item--current]="i === 0">
          <div class="timeline__marker"></div>
          <div class="timeline__card">
            <div class="timeline__header">
              <div>
                <h3 class="timeline__company">{{ job.company }}</h3>
                <p class="timeline__role">{{ job.role }}</p>
              </div>
              <span class="timeline__period">{{ job.period }}</span>
            </div>
            <p class="timeline__description">{{ job.description }}</p>
            <div class="timeline__tech">
              @for (tech of job.tech; track tech) {
                <span class="tag">{{ tech }}</span>
              }
            </div>
          </div>
        </article>
      }
    </div>
  </div>
</section>
