<section class="section about" id="about">
  <div class="container">
    <div class="section__header">
      <span class="section__eyebrow">About Me</span>
      <h2 class="section__title">Who I Am</h2>
    </div>

    <div class="about__grid">
      <div class="about__content">
        <p class="about__text">{{ profile.summary }}</p>
        <p class="about__text">{{ profile.aboutExtra }}</p>

        <ul class="about__details">
          <li>
            <span class="about__label">Location</span>
            <span>{{ profile.location }}</span>
          </li>
          <li>
            <span class="about__label">Email</span>
            <a [href]="'mailto:' + profile.email">{{ profile.email }}</a>
          </li>
          <li>
            <span class="about__label">Availability</span>
            <span>Open to opportunities</span>
          </li>
        </ul>
      </div>

      <div class="about__stats">
        @for (stat of stats; track stat.label) {
          <div class="stat-card">
            <span class="stat-card__value">{{ stat.value }}</span>
            <span class="stat-card__label">{{ stat.label }}</span>
          </div>
        }
      </div>
    </div>
  </div>
</section>
