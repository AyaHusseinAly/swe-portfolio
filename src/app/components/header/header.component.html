<header class="header" [class.scrolled]="scrolled()" [class.menu-open]="menuOpen()">
  <div class="container header__inner">
    <a class="logo" href="#" (click)="closeMenu()">
      <span class="logo__mark">{{ profile.initials }}</span>
      <span class="logo__text">{{ profile.name }}</span>
    </a>

    <button
      class="menu-toggle"
      type="button"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Toggle navigation menu"
      (click)="toggleMenu()"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="nav">
      @for (link of navLinks; track link.href) {
        <a class="nav__link" [href]="link.href" (click)="closeMenu()">{{ link.label }}</a>
      }
      <a class="btn btn--sm" [href]="profile.github" target="_blank" rel="noopener noreferrer">
        GitHub
      </a>
    </nav>
  </div>
</header>
