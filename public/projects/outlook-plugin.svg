  <path d="M60 78 L120 118 L180 78" stroke="#fff" stroke-width="3" fill="none" opacity="0.8"/>
  <rect x="75" y="95" width="90" height="8" rx="2" fill="#fff" opacity="0.5"/>
  <rect x="75" y="110" width="60" height="6" rx="2" fill="#fff" opacity="0.35"/>
