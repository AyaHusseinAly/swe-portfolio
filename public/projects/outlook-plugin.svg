  <path d="M195 120 L235 120" stroke="#14b8a6" stroke-width="3" marker-end="url(#arrow)"/>
  <circle cx="215" cy="120" r="14" fill="#14b8a6" opacity="0.3"/>
  <path d="M208 120 L215 113 L222 120 L215 127 Z" fill="#14b8a6"/>
