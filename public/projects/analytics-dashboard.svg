<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <rect width="400" height="240" fill="#1e293b"/>
  <!-- Dashboard frame -->
  <rect x="50" y="40" width="300" height="160" rx="10" fill="#334155" stroke="#14b8a6" stroke-width="1.5" opacity="0.8"/>
  <!-- Bar chart -->
  <rect x="75" y="130" width="30" height="50" rx="4" fill="#14b8a6" opacity="0.8"/>
  <rect x="115" y="110" width="30" height="70" rx="4" fill="#14b8a6"/>
  <rect x="155" y="90" width="30" height="90" rx="4" fill="#f59e0b" opacity="0.85"/>
  <rect x="195" y="120" width="30" height="60" rx="4" fill="#14b8a6" opacity="0.7"/>
  <!-- Line chart overlay -->
  <polyline points="250,150 280,120 310,135 340,90 370,105" stroke="#f59e0b" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="280" cy="120" r="5" fill="#f59e0b"/>
  <circle cx="340" cy="90" r="5" fill="#f59e0b"/>
  <!-- KPI cards -->
  <rect x="70" y="55" width="70" height="35" rx="6" fill="#1e293b" stroke="#64748b"/>
  <rect x="80" y="65" width="40" height="6" rx="2" fill="#14b8a6"/>
  <rect x="155" y="55" width="70" height="35" rx="6" fill="#1e293b" stroke="#64748b"/>
  <rect x="165" y="65" width="30" height="6" rx="2" fill="#f59e0b"/>
  <!-- Alert indicator -->
  <circle cx="330" cy="55" r="12" fill="#ef4444" opacity="0.7"/>
  <text x="330" y="59" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">!</text>
  <!-- Decorative hexagon -->
  <polygon points="360,180 380,165 380,145 360,130 340,145 340,165" fill="#14b8a6" opacity="0.15"/>
</svg>
